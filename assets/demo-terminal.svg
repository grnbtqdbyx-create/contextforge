<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">ContextForge terminal demo</title>
  <desc id="desc">A terminal showing ContextForge scan, usage, context audit, cache audit, and report commands.</desc>
  <rect width="980" height="560" rx="10" fill="#111315"/>
  <rect x="0" y="0" width="980" height="42" rx="10" fill="#202326"/>
  <circle cx="24" cy="21" r="6" fill="#ff5f57"/>
  <circle cx="46" cy="21" r="6" fill="#ffbd2e"/>
  <circle cx="68" cy="21" r="6" fill="#28c840"/>
  <text x="92" y="27" fill="#b8c0c8" font-family="Menlo, Consolas, monospace" font-size="14">contextforge demo</text>
  <g font-family="Menlo, Consolas, monospace" font-size="18">
    <text x="34" y="78" fill="#8bd5ff">$ pnpm contextforge scan --demo</text>
    <text x="34" y="110" fill="#f2f4f8">ContextForge scan complete: 7 records</text>
    <text x="34" y="140" fill="#f2f4f8">Providers: claude, codex</text>

    <text x="34" y="192" fill="#8bd5ff">$ pnpm contextforge usage --demo</text>
    <text x="34" y="224" fill="#f2f4f8">Total tokens: 11482</text>
    <text x="34" y="254" fill="#f2f4f8">Input: 8112  Output: 3370  Cached: 3328</text>
    <text x="34" y="284" fill="#a6e3a1">By kind: user, assistant, tool</text>

    <text x="34" y="336" fill="#8bd5ff">$ pnpm contextforge agents-md-audit --demo</text>
    <text x="34" y="368" fill="#f2f4f8">Context Health Score: 76/100</text>
    <text x="34" y="398" fill="#f9e2af">[medium] vague: AGENTS.md contains vague guidance</text>

    <text x="34" y="450" fill="#8bd5ff">$ pnpm contextforge cache-audit --demo</text>
    <text x="34" y="482" fill="#f2f4f8">Cache Stability Score: 75/100</text>
    <text x="34" y="512" fill="#cba6f7">Wrote contextforge-report.html</text>
  </g>
</svg>
