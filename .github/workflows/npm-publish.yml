name: npm Publish

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run all publish checks without publishing to npm"
        required: true
        type: boolean
        default: true
      npm_tag:
        description: "npm dist-tag to publish"
        required: true
        type: choice
        default: latest
        options:
          - latest
          - next

permissions:
  contents: read
  id-token: write
  attestations: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NPM_TAG: ${{ inputs.npm_tag }}

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: corepack enable
      - run: corepack prepare pnpm@11.2.2 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: node dist/cli.js security-benchmark
      - run: node dist/cli.js audit --min-context-score 70 --min-cache-score 70 --min-security-score 70 --output contextforge-audit.json --report contextforge-report.html
      - run: node dist/cli.js publish-readiness --summary contextforge-publish-readiness.md
      - run: npm pack --dry-run
      - run: npm pack --json > npm-pack.json
      - name: Generate npm tarball attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: 'contextforge-*.tgz'
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        if: always()
        with:
          name: contextforge-npm-publish-readiness
          path: |
            contextforge-publish-readiness.md
            npm-pack.json
            contextforge-*.tgz

  publish:
    if: ${{ inputs.dry_run == false }}
    needs: preflight
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: corepack enable
      - run: corepack prepare pnpm@11.2.2 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: node dist/cli.js security-benchmark
      - run: node dist/cli.js audit --min-context-score 70 --min-cache-score 70 --min-security-score 70 --output contextforge-audit.json --report contextforge-report.html
      - run: node dist/cli.js publish-readiness --summary contextforge-publish-readiness.md
      - run: npm pack --dry-run
      - run: npm pack --json > npm-pack.json
      - name: Generate npm tarball attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: 'contextforge-*.tgz'
      - name: Publish to npm
        run: npm publish contextforge-*.tgz --access public --tag "$NPM_TAG"
