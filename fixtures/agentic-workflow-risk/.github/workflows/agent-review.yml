name: AI review

on:
  pull_request_target:

permissions:
  contents: write
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Run agent review
        run: codex exec "Review ${{ github.event.pull_request.body }}"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
