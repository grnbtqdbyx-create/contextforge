name: 'ContextForge Audit'
description: 'Run ContextForge context health, cache stability, security, HTML, JSON, SARIF, Markdown, PR comment, suggestions, badge, proof pack, review kit, artifact map, and agent action plan audits.'
author: 'Ogün Keskin'

branding:
  icon: 'shield'
  color: 'green'

inputs:
  min-context-score:
    description: 'Minimum context health score.'
    required: false
    default: '60'
  min-cache-score:
    description: 'Minimum cache stability score.'
    required: false
    default: '60'
  min-security-score:
    description: 'Minimum context security score.'
    required: false
    default: '60'
  output:
    description: 'JSON audit output path in the caller workspace.'
    required: false
    default: 'contextforge-audit.json'
  report:
    description: 'HTML report output path in the caller workspace.'
    required: false
    default: 'contextforge-report.html'
  sarif:
    description: 'SARIF output path in the caller workspace.'
    required: false
    default: 'contextforge.sarif'
  summary:
    description: 'Markdown summary output path in the caller workspace.'
    required: false
    default: 'contextforge-summary.md'
  plan:
    description: 'Agent-readable action plan output path in the caller workspace.'
    required: false
    default: 'contextforge-agent-plan.md'
  comment:
    description: 'PR-ready Markdown comment output path in the caller workspace.'
    required: false
    default: 'contextforge-pr-comment.md'
  suggestions:
    description: 'Machine-readable improvement suggestions JSON output path in the caller workspace.'
    required: false
    default: 'contextforge-suggestions.json'
  badge:
    description: 'SVG status badge output path in the caller workspace.'
    required: false
    default: 'contextforge-badge.svg'
  proof-pack:
    description: 'Shareable proof pack Markdown output path in the caller workspace.'
    required: false
    default: 'contextforge-proof-pack.md'
  review-kit:
    description: 'Codex/Claude review kit Markdown output path in the caller workspace.'
    required: false
    default: 'contextforge-review-kit.md'
  artifact-map:
    description: 'Artifact map Markdown output path in the caller workspace.'
    required: false
    default: 'contextforge-artifact-map.md'
  review-base-ref:
    description: 'Base ref for changed-file review-kit generation.'
    required: false
    default: 'main'

outputs:
  audit-json:
    description: 'Path to the generated JSON audit report.'
    value: ${{ inputs.output }}
  html-report:
    description: 'Path to the generated HTML report.'
    value: ${{ inputs.report }}
  sarif:
    description: 'Path to the generated SARIF report.'
    value: ${{ inputs.sarif }}
  markdown-summary:
    description: 'Path to the generated Markdown summary.'
    value: ${{ inputs.summary }}
  agent-action-plan:
    description: 'Path to the generated agent-readable action plan.'
    value: ${{ inputs.plan }}
  pr-comment:
    description: 'Path to the generated PR-ready Markdown comment.'
    value: ${{ inputs.comment }}
  suggestions-json:
    description: 'Path to the generated machine-readable improvement suggestions.'
    value: ${{ inputs.suggestions }}
  badge-svg:
    description: 'Path to the generated SVG status badge.'
    value: ${{ inputs.badge }}
  proof-pack-md:
    description: 'Path to the generated shareable proof pack.'
    value: ${{ inputs.proof-pack }}
  review-kit-md:
    description: 'Path to the generated Codex/Claude review kit.'
    value: ${{ inputs.review-kit }}
  artifact-map-md:
    description: 'Path to the generated artifact map.'
    value: ${{ inputs.artifact-map }}

runs:
  using: 'composite'
  steps:
    - name: Build ContextForge CLI
      shell: bash
      run: |
        cd "$GITHUB_ACTION_PATH"
        npm exec --yes --package pnpm@11.2.2 -- pnpm install --frozen-lockfile
        npm exec --yes --package pnpm@11.2.2 -- pnpm build
    - name: Run ContextForge audit
      shell: bash
      run: |
        cd "$GITHUB_WORKSPACE"
        node "$GITHUB_ACTION_PATH/dist/cli.js" audit \
          --min-context-score "${{ inputs.min-context-score }}" \
          --min-cache-score "${{ inputs.min-cache-score }}" \
          --min-security-score "${{ inputs.min-security-score }}" \
          --output "${{ inputs.output }}" \
          --report "${{ inputs.report }}" \
          --sarif "${{ inputs.sarif }}" \
          --summary "${{ inputs.summary }}" \
          --plan "${{ inputs.plan }}" \
          --comment "${{ inputs.comment }}" \
          --suggestions "${{ inputs.suggestions }}" \
          --badge "${{ inputs.badge }}"
        if [[ -n "${GITHUB_STEP_SUMMARY:-}" && -f "${{ inputs.summary }}" ]]; then
          cat "${{ inputs.summary }}" >> "$GITHUB_STEP_SUMMARY"
        fi
    - name: Run ContextForge proof pack
      if: always()
      shell: bash
      run: |
        cd "$GITHUB_WORKSPACE"
        node "$GITHUB_ACTION_PATH/dist/cli.js" proof-pack \
          --min-context-score "${{ inputs.min-context-score }}" \
          --min-cache-score "${{ inputs.min-cache-score }}" \
          --min-security-score "${{ inputs.min-security-score }}" \
          --output "${{ inputs.proof-pack }}"
    - name: Run ContextForge review kit
      if: always()
      shell: bash
      run: |
        cd "$GITHUB_WORKSPACE"
        node "$GITHUB_ACTION_PATH/dist/cli.js" review-kit \
          --base "${{ inputs.review-base-ref }}" \
          --output "${{ inputs.review-kit }}"
    - name: Run ContextForge artifact map
      if: always()
      shell: bash
      run: |
        cd "$GITHUB_WORKSPACE"
        node "$GITHUB_ACTION_PATH/dist/cli.js" artifact-map \
          --output "${{ inputs.artifact-map }}"
